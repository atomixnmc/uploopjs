<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#646cff"/>
      <stop offset="100%" stop-color="#ff44aa"/>
    </linearGradient>
  </defs>
  <!-- Icon: lightning bolt inside circle (HyperGraph node) -->
  <circle cx="80" cy="100" r="60" stroke="url(#g)" stroke-width="4" fill="none"/>
  <circle cx="80" cy="100" r="40" stroke="url(#g)" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
  <!-- Inner node with edge line -->
  <circle cx="200" cy="60" r="30" stroke="url(#g)" stroke-width="3" fill="none"/>
  <line x1="120" y1="85" x2="175" y2="68" stroke="url(#g)" stroke-width="2"/>
  <circle cx="200" cy="140" r="30" stroke="url(#g)" stroke-width="3" fill="none"/>
  <line x1="120" y1="115" x2="175" y2="132" stroke="url(#g)" stroke-width="2"/>
  <!-- Lightning bolt in center -->
  <polygon points="80,55 65,105 85,95 70,145 100,90 80,100" fill="url(#g)"/>
  <!-- Text -->
  <text x="260" y="105" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="#1e1e2e">Uploop</text>
  <text x="260" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#888">The HyperGraph UI Framework</text>
</svg>
